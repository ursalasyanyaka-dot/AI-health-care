<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hero section</title>
    <style>
        .hero {
            background-color: #1A5276;
            color: white;
            text-align: center;
            padding: 80px 20px;
        }
        .hero h1 {
            font-size: 3em;
            margin-bottom: 10px ;
        }
        .hero p{
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        .hero a{
            display: inline-block;
            background-color: white;
            color: #1A5276;
            padding: 12px 28px;
            border-radius: 8px ;
            text-decoration: none;
            font-weight: bold;
        }
        .hero a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Ursala</h1>
        <p>Building Zambia's culturally Intelligent Health AI</p>
        <a href="#project">View My Project</a>
    </section>
</body>
</html>
